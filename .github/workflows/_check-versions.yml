name: _check-versions

# Reusable: stamp the incoming version into every dist manifest, then assert it
# took. Dist never tags independently — the version is the one carried in the
# repository_dispatch payload from the toolchain release.

on:
  workflow_call:
    inputs:
      version:
        description: "Toolchain release version, e.g. 'v0.3.2'."
        type: string
        required: true

jobs:
  check:
    name: Stamp + verify manifest versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Stamp manifests to the release version
        run: make stamp-versions VERSION=${{ inputs.version }}
      - name: Verify every manifest matches
        run: make check-versions VERSION=${{ inputs.version }}
