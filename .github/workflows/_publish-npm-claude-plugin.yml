name: _publish-npm-claude-plugin

# Reusable: publish @temporal-architect/claude-plugin to npm — the payload
# Claude Code's marketplace fetches on plugin install. Stages skills/ from the
# toolchain Release skills tarball.

on:
  workflow_call:
    inputs:
      version:
        description: "Toolchain release version, e.g. 'v0.3.2'."
        type: string
        required: true

# Trusted publishing (OIDC) — no NPM_TOKEN. id-token:write must also be set on
# the calling job in _consume-release.yml (npm validates the caller workflow).
# Built in this (dist) repo, so we publish with --provenance.
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish @temporal-architect/claude-plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports OIDC (>= 11.5.1)
        run: npm install -g npm@latest
      - name: Fetch + stage skills payload
        run: |
          make fetch-release VERSION=${{ inputs.version }}
          make stamp-versions VERSION=${{ inputs.version }}
          make build-claude-plugin VERSION=${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish
        working-directory: packages/npm/claude-plugin
        run: npm publish --access public --provenance
