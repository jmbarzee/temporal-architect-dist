name: _publish-npm-twf

# Reusable: publish @temporal-architect/twf and its 5 platform sub-packages.
# Stages each platform binary from the toolchain Release archives.
#
# Order: sub-packages publish first (parallel matrix), wrapper publishes last.
# npm rejects the wrapper if its optionalDependencies reference versions that
# don't exist yet.

on:
  workflow_call:
    inputs:
      version:
        description: "Toolchain release version, e.g. 'v0.3.2'."
        type: string
        required: true

# Trusted publishing (OIDC) — no NPM_TOKEN. id-token:write must also be set on
# the calling job in _consume-release.yml (npm validates the caller workflow).
# These packages are assembled in this (dist) repo, so the Makefile publishes
# them with --provenance (repository.url matches temporal-architect-dist).
permissions:
  id-token: write
  contents: read

jobs:
  publish-sub-packages:
    name: Publish sub-pkg (${{ matrix.vsce_target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { vsce_target: darwin-arm64, goos: darwin, goarch: arm64 }
          - { vsce_target: darwin-x64, goos: darwin, goarch: amd64 }
          - { vsce_target: linux-x64, goos: linux, goarch: amd64 }
          - { vsce_target: linux-arm64, goos: linux, goarch: arm64 }
          - { vsce_target: win32-x64, goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports OIDC (>= 11.5.1)
        run: npm install -g npm@latest
      - name: Fetch + stamp
        run: |
          make fetch-release VERSION=${{ inputs.version }}
          make stamp-versions VERSION=${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish npm sub-package
        run: make publish-npm-platform VSCE_TARGET=${{ matrix.vsce_target }} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} VERSION=${{ inputs.version }}

  publish-wrapper:
    name: Publish @temporal-architect/twf wrapper
    needs: publish-sub-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports OIDC (>= 11.5.1)
        run: npm install -g npm@latest
      - name: Fetch + stamp
        run: |
          make fetch-release VERSION=${{ inputs.version }}
          make stamp-versions VERSION=${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish wrapper
        run: make publish-npm VERSION=${{ inputs.version }}
