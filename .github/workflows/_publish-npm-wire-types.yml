name: _publish-npm-wire-types

# Reusable: publish @temporal-architect/wire-types to npm by RE-PUBLISHING the
# prebuilt tarball downloaded from the toolchain Release. The wire contract is
# generated from the Go DTOs in the toolchain; this only re-publishes it so the
# extension can depend on the published, version-pinned package.

on:
  workflow_call:
    inputs:
      version:
        description: "Toolchain release version, e.g. 'v0.3.2'."
        type: string
        required: true

# Trusted publishing (OIDC) — no NPM_TOKEN. id-token:write must also be set on
# the calling job in _consume-release.yml (npm validates the caller workflow).
# Provenance is DISABLED here (NPM_CONFIG_PROVENANCE=false on the publish step):
# trusted publishing auto-enables provenance, but this re-publishes a tarball
# built in the TOOLCHAIN repo whose repository.url points there, so npm's
# provenance repo-match check rejects it (E422). OIDC auth still applies.
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish @temporal-architect/wire-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports OIDC (>= 11.5.1)
        run: npm install -g npm@latest
      - name: Fetch release tarball
        run: make fetch-release VERSION=${{ inputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish downloaded tarball
        run: make publish-wire-types VERSION=${{ inputs.version }}
        env:
          # Skip auto-provenance: this tarball is built in the toolchain repo, so
          # its repository.url won't match this repo and provenance fails (E422).
          NPM_CONFIG_PROVENANCE: "false"
