name: _publish-pypi

# Reusable: build a platform-tagged wheel per platform, then upload all wheels
# to PyPI as a single twine batch. Consumes twf-bin-* artifacts uploaded by
# _build-binaries.yml.

on:
  workflow_call:
    inputs:
      version:
        description: "Git tag including leading 'v', e.g. 'v0.3.2'."
        type: string
        required: true
    secrets:
      PYPI_TOKEN:
        description: "PyPI API token (project-scoped to twf-cli)."
        required: true

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.vsce_target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - vsce_target: darwin-arm64
            goos: darwin
            pypi_tag: macosx_11_0_arm64
          - vsce_target: darwin-x64
            goos: darwin
            pypi_tag: macosx_10_15_x86_64
          - vsce_target: linux-x64
            goos: linux
            pypi_tag: manylinux2014_x86_64
          - vsce_target: linux-arm64
            goos: linux
            pypi_tag: manylinux2014_aarch64
          - vsce_target: win32-x64
            goos: windows
            pypi_tag: win_amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install build wheel

      - name: Download raw twf binary
        uses: actions/download-artifact@v4
        with:
          name: twf-bin-${{ matrix.vsce_target }}
          path: packages/vscode/bin/

      - name: Restore binary executable bit
        if: matrix.goos != 'windows'
        run: chmod +x packages/vscode/bin/twf

      - name: Build wheel
        run: make build-pypi-wheel PLATFORM_TAG=${{ matrix.pypi_tag }} GOOS=${{ matrix.goos }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.vsce_target }}
          path: packages/pypi/twf-cli/dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install twine

      - uses: actions/download-artifact@v4
        with:
          pattern: pypi-wheel-*
          path: packages/pypi/twf-cli/dist/
          merge-multiple: true

      - name: Publish to PyPI
        run: make publish-pypi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
