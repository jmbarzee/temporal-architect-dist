[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "twf-cli"
version = "0.3.2"
description = "TWF (Temporal Workflow Format) CLI, language server, and MCP server."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
authors = [{ name = "Jamie Barzee" }]
keywords = ["temporal", "workflow", "twf", "dsl", "mcp", "lsp", "cli"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Operating System :: MacOS",
  "Operating System :: POSIX :: Linux",
  "Operating System :: Microsoft :: Windows",
  "Programming Language :: Python :: 3",
  "Topic :: Software Development",
]

[project.urls]
Homepage = "https://github.com/jmbarzee/temporal-skills"
Source = "https://github.com/jmbarzee/temporal-skills"
Issues = "https://github.com/jmbarzee/temporal-skills/issues"

[project.scripts]
twf = "twf_cli.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/twf_cli"]
#
# The bundled platform binary is staged into src/twf_cli/_binary/ at CI time
# by `make build-pypi-wheel`. Hatchling excludes leading-underscore
# directories from `packages` by default, so we explicitly force-include the
# `_binary/` dir at the proper install path.
#
# Wheels are built as py3-none-any by hatchling, then retagged to the target
# platform via `python -m wheel tags --platform-tag <tag>` in the Makefile.
# Each wheel ships exactly one platform binary.

[tool.hatch.build.targets.wheel.force-include]
"src/twf_cli/_binary" = "twf_cli/_binary"
